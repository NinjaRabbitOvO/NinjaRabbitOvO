name: Update Contribution Trophy

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 */7 * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate SVG
        env:
          GITHUB_USERNAME: ${{ github.repository_owner }}
          GH_TOKEN: ${{ github.token }}
          OUTPUT_FILE: assets/contribution-trophy.svg
          README_FILE: README.md
          UPDATE_README: 'true'
          ANIMATE: 'true'
          TROPHY_THEME: default
        run: node generate-trophy-svg.mjs

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update contribution trophy'
          file_pattern: README.md assets/contribution-trophy.svg
